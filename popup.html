<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      width: 220px;
      padding: 15px;
      background-color: #f4f4f9;
      margin: 0;
    }
    h3 {
      margin: 0 0 15px 0;
      color: #2c3e50;
      text-align: center;
    }
    .setting {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #333;
    }
    /* Sleek toggle switch CSS */
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #2c3e50; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h3>ZenForces</h3>
  <div class="setting">
    <span>Zen Mode in Gyms</span>
    <label class="switch">
      <input type="checkbox" id="gymToggle">
      <span class="slider"></span>
    </label>
  </div>
  <p style="font-size: 11px; color: #777; margin-top: 10px; text-align: center;">
    If OFF, standings and solved counts will be visible in Gym practice.
  </p>
  <script src="popup.js"></script>
</body>
</html>
